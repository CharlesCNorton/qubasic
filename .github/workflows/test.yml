name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[charts]" pytest-cov mypy hypothesis
      - name: Run tests
        run: python -m pytest test_qbasic.py test_cures.py test_gaps.py -v --tb=short --cov=qbasic_core --cov-report=term-missing --cov-fail-under=60
      - name: Type check
        run: mypy qbasic_core --ignore-missing-imports
        continue-on-error: false
