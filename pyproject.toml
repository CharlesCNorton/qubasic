[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "qbasic"
version = "0.1.0"
description = "Quantum BASIC Interactive Terminal"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Charles C. Norton"},
]
dependencies = [
    "qiskit>=1.0",
    "qiskit-aer>=0.13",
    "numpy>=1.24",
    "psutil>=5.9",
    "rich>=13.0",
]

[project.optional-dependencies]
charts = ["plotille>=5.0"]

[project.scripts]
qbasic = "qbasic:main"

[tool.setuptools]
py-modules = ["qbasic"]
packages = ["qbasic_core"]

[tool.coverage.run]
source = ["qbasic_core"]
omit = ["*/test_*"]

[tool.coverage.report]
show_missing = true
skip_empty = true

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
